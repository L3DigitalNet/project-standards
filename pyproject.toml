[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-standards"
version = "1.0.2"
description = "Reusable project standards, templates, schemas, and validation tools."
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = [
    "jsonschema>=4.23.0",
    "pyyaml>=6.0.2",
]

[project.scripts]
validate-frontmatter = "tools.validate_frontmatter:main"

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "ruff>=0.9.0",
    "pyright>=1.1.390",
]

[tool.hatch.build.targets.wheel]
packages = ["tools"]

# Ship the JSON Schema inside the wheel so `uv tool install git+...` downstream
# installs can resolve the bundled "markdown-frontmatter" schema by name.
# The validator looks for it under <package>/schemas/ (see find_bundled_schema).
[tool.hatch.build.targets.wheel.force-include]
"schemas/markdown-frontmatter.schema.json" = "tools/schemas/markdown-frontmatter.schema.json"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.11"
include = ["tools", "tests"]
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
