[standard]
id = "markdown-frontmatter"

[[artifact]]
kind = "file"
owner = true
source = "project-standards.starter.yml"
dest = ".project-standards.yml"

[[artifact]]
kind = "workflow-caller"
owner = true
# dest is the consumer's caller filename (distinct from the reusable workflow it
# calls, .../validate-markdown-frontmatter.yml); matches the adopt.md/README prose.
source = "validate-markdown-frontmatter.caller.yml"
dest = ".github/workflows/validate-standards.yml"
