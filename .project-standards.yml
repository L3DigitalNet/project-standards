# Configuration for the Markdown Frontmatter Standard validator.
# Consumed by src/project_standards/validate_frontmatter.py and the CI workflow.
# This is also the canonical example of the downstream config shape.

standards_version: "v4"

markdown:
  frontmatter:
    version: "1.1"
    # Bundled schema name (resolves to src/project_standards/schemas/markdown-frontmatter.schema.json),
    # or a path to a schema file.
    schema: "markdown-frontmatter"
    required: true
    include:
      - "CHANGELOG.md"
      - "UPGRADING.md"
      - "docs/usage.md"
      - "meta/**/*.md"
      # ADRs are managed docs (the ADR standard says never exclude docs/adr/**);
      # this repo dogfoods that by validating its own architecture decisions. The
      # opt-in markdown.adr.require_sections check below then enforces the three
      # MADR sections on every doc_type: adr file here.
      - "docs/adr/**/*.md"
    exclude:
      # Standard bundles are published/consumed content, not this repo's local managed-document corpus.
      # ADR 0015 keeps standards/** out of markdown-frontmatter so repo-local metadata is never required there.
      - "standards/**"
      # README.md is the human-facing landing page; GitHub renders frontmatter as a
      # table there. Downstream repos may still include their README — that is their call.
      - "README.md"
      # Agent-instruction files are harness configuration, not managed docs — never frontmatter.
      - "CLAUDE.md"
      - "AGENTS.md"
      - ".claude/**"
      - ".agents/**"
      - ".codex/**"
      # Agent session state (handoff-system-v3) is harness state, not managed docs.
      - "docs/handoff/**"

  # Opt-in ADR body-structure check (separate from markdown.frontmatter above).
  # When true, every `doc_type: adr` document must contain the three MADR-required
  # level-2 sections (Context and Problem Statement / Considered Options /
  # Decision Outcome). Off by default; enabled here to dogfood the check on the
  # shipped ADR example. See standards/adr/README.md.
  adr:
    version: "1.0"
    require_sections: true

# Contract-version selections for the standards this repo defines. Metadata-only
# selections produce no output when known and exit 2 when unknown; validator-backed
# selections also choose the bundled contract the validator enforces.
python_tooling:
  version: "1.0"

markdown_tooling:
  version: "1.1"

cli_documentation:
  version: "1.0"

# Project Specification Standard: which files `spec validate`/`spec lint` check.
# This repo's own planning docs (docs/superpowers/specs/) predate this standard and use
# a different convention — they are not project specs. The dogfood example under
# standards/project-spec/examples/ is what's validated here, per standards/project-spec/adopt.md.
spec:
  version: "1.0"
  include:
    - "standards/project-spec/examples/**/*.md"
    # MCP enablement spec set (SPEC-MT01/RD01/MS01) — real Project Specification
    # documents that use spec_id/profile frontmatter, so they ARE gated by `spec
    # validate`/`lint`. Listed by explicit path (not a docs/superpowers/specs/**
    # glob) on purpose: the other files in that directory are frontmatter-less
    # brainstorming design docs on a different convention, not project specs.
    - "docs/superpowers/specs/2026-07-07-project-standards-meta-repo-mcp-readiness-spec.md"
    - "docs/superpowers/specs/2026-07-07-project-standards-mcp-enablement-roadmap-spec.md"
    - "docs/superpowers/specs/2026-07-07-project-standards-mcp-server-implementation-spec.md"
    # v5 Step 02 design (SPEC-BA01) — the Standard Bundle Authoring meta-standard.
    - "docs/superpowers/specs/2026-07-07-standard-bundle-authoring-standard.md"
    # Agent Handoff v1 standards-package ingestion (SPEC-DPEY).
    - "docs/superpowers/specs/2026-07-09-agent-handoff-standard-package.md"
