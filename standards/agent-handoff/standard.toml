# Machine manifest for the Agent Handoff Standard.

[standard]
id = "agent-handoff"
name = "Agent Handoff Standard"
status = "active"
summary = "Repository-local, lifetime-routed project knowledge and bounded agent session continuity."
adoption = "cli"

[versions]
supported = ["1.0"]
latest = "1.0"

[config]
namespaces = ["agent_handoff"]

[capabilities]
provides = [
  "agent-handoff.scaffold",
  "agent-handoff.validate",
  "agent-handoff.drift-check",
  "agent-handoff.session-context",
  "agent-handoff.legacy-report",
]
consumes_platform = [
  "project-standards.validate",
  "project-standards.drift-check",
  "project-standards.extract",
]

[relations]
companions = []
extends = []
conflicts = []

[resources]
readme = "README.md"
adopt = "adopt.md"
agent_summary = "agent-summary.md"
template_status = "templates/STATUS.md"
template_todo = "templates/TODO.md"
template_state = "templates/handoff/state.md"
template_deployed = "templates/handoff/deployed.md"
template_architecture = "templates/handoff/architecture.md"
template_credentials = "templates/handoff/credentials.md"
template_conventions = "templates/handoff/conventions.md"
template_specs_plans = "templates/handoff/specs-plans.md"
template_sessions_keep = "templates/handoff/sessions/.gitkeep"
template_bugs_keep = "templates/handoff/bugs/.gitkeep"
hook_session_start = "hooks/session-start/session_start.py"
skill = "skills/agent-handoff/SKILL.md"
skill_openai = "skills/agent-handoff/agents/openai.yaml"
policy = "resources/policy.toml"
legacy_migration = "resources/legacy-migration.md"
integration_project_config = "resources/integration/project-config.yml"
integration_agent_instructions = "resources/integration/agent-instructions.md"
integration_claude_session_start = "resources/integration/claude-session-start.json"
integration_codex_session_start = "resources/integration/codex-session-start.toml"
provenance_lock_seed = "runtime/provenance-lock.json"

[artifacts]
manifest = "src/project_standards/bundles/agent-handoff/adopt.toml"

[[authority]]
domain = "agent-handoff"
target = "docs/STATUS.md"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/TODO.md"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/handoff/state.md"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/handoff/deployed.md"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/handoff/architecture.md"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/handoff/credentials.md"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/handoff/conventions.md"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/handoff/specs-plans.md"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/handoff/sessions/.gitkeep"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "docs/handoff/bugs/.gitkeep"
concern = "knowledge-scaffold"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = ".agents/hooks/agent-handoff/session_start.py"
concern = "managed-session-start-hook"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = ".agents/skills/agent-handoff/SKILL.md"
concern = "managed-agent-skill"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = ".agents/skills/agent-handoff/agents/openai.yaml"
concern = "managed-agent-skill"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = ".project-standards.yml"
concern = "managed-config-block"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "AGENTS.md"
concern = "managed-instruction-block"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = "CLAUDE.md"
concern = "managed-instruction-block"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = ".claude/settings.json"
concern = "managed-session-start-registration"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = ".codex/config.toml"
concern = "managed-session-start-registration"
owner = "agent-handoff"
mutates = true

[[authority]]
domain = "agent-handoff"
target = ".agents/agent-handoff/manifest.json"
concern = "managed-provenance-lock"
owner = "agent-handoff"
mutates = true

[[providers]]
operation = "scaffold"
kind = "python"
entrypoint = "project_standards.agent_handoff.providers:scaffold"
optional = false

[[providers]]
operation = "validate"
kind = "python"
entrypoint = "project_standards.agent_handoff.providers:validate"
optional = false

[[providers]]
operation = "drift-check"
kind = "python"
entrypoint = "project_standards.agent_handoff.providers:drift_check"
optional = false

[[providers]]
operation = "extract"
kind = "python"
entrypoint = "project_standards.agent_handoff.providers:extract"
optional = false

[[providers]]
operation = "upgrade"
kind = "python"
entrypoint = "project_standards.agent_handoff.providers:upgrade"
optional = false
