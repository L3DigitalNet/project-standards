[[legacy_states]]
id = "v4-python-tooling"

[[migrations]]
# 5.8.0 FR-001..004 / issue #31: the 1.7->1.8 delta is the pytest collection
# roots surfacing across the pytest testpaths key, both checker include tables,
# the Ruff src value, and the VS Code pytestArgs setting. Coverage sources are
# unchanged, so coverage-run-config is not in the affected set.
id = "python-tooling-1-7-to-1-8"
from = "package:1.7"
to = "package:1.8"
mode = "automatic"
provider = "migrate-legacy"
reversible = false
affected = [
  "contribution:basedpyright-include",
  "contribution:pyright-include",
  "contribution:pytest-testpaths",
  "contribution:ruff-config",
  "contribution:vscode-pytest-args",
]

