[[providers]]
id = "migrate-legacy"
operation = "migrate"
kind = "python"
phase = "plan"
effect = "migration-report"
entrypoint = "payload:provider-code#run_migrate"
input_schema = "provider-input"
output_schema = "provider-migration-report"
resources = ["legacy-workflow"]

[[legacy_states]]
id = "v4-project-spec"

[[migrations]]
id = "legacy-v4-to-1-4"
from = "legacy:v4-project-spec"
to = "package:1.4"
mode = "automatic"
provider = "migrate-legacy"
reversible = false
affected = ["config:*", "contribution:validate-specs-workflow"]
signatures = ["legacy-workflow"]

