[[contributions]]
id = "validate-specs-workflow"
target = ".github/workflows/validate-specs.yml"
adapter = "whole-file"
scope = "$file"
policy = "managed"
provider = "render-workflow"
when_any = [{ option = "workflow_ownership", equals = "managed" }]

[[providers]]
id = "validate"
operation = "validate"
kind = "python"
phase = "validate"
effect = "findings"
entrypoint = "payload:provider-code#run_validate"
input_schema = "provider-input"
output_schema = "provider-findings"
resources = ["template-full", "template-light", "template-standard"]

[[providers]]
id = "lint"
operation = "lint"
kind = "python"
phase = "validate"
effect = "findings"
entrypoint = "payload:provider-code#run_lint"
input_schema = "provider-input"
output_schema = "provider-findings"
resources = ["template-full", "template-light", "template-standard"]

[[providers]]
id = "extract"
operation = "extract"
kind = "python"
phase = "inspect"
effect = "content"
entrypoint = "payload:provider-code#run_extract"
input_schema = "provider-input"
output_schema = "provider-extract"
resources = []

[[providers]]
id = "id-next"
operation = "id-next"
kind = "python"
phase = "inspect"
effect = "content"
entrypoint = "payload:provider-code#run_id_next"
input_schema = "provider-input"
output_schema = "provider-id-next"
resources = ["template-full", "template-light", "template-standard"]

[[providers]]
id = "scaffold"
operation = "scaffold"
kind = "python"
phase = "authoring"
effect = "mutation-plan"
entrypoint = "payload:provider-code#run_scaffold"
input_schema = "provider-input"
output_schema = "provider-mutation-plan"
resources = ["template-full", "template-light", "template-standard"]

[[providers]]
id = "upgrade"
operation = "upgrade"
kind = "python"
phase = "authoring"
effect = "mutation-plan"
entrypoint = "payload:provider-code#run_upgrade"
input_schema = "provider-input"
output_schema = "provider-mutation-plan"
resources = ["template-full", "template-light", "template-standard"]

[[providers]]
id = "render-workflow"
operation = "render"
kind = "python"
phase = "plan"
effect = "content"
entrypoint = "payload:provider-code#run_render_workflow"
input_schema = "provider-input"
output_schema = "provider-content"
resources = ["self-host-workflow"]

[[providers]]
id = "render-preview"
operation = "render"
kind = "python"
phase = "plan"
effect = "content"
entrypoint = "payload:provider-code#run_render_preview"
input_schema = "provider-input"
output_schema = "provider-content"
