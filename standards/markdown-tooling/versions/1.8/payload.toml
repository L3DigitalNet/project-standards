[[legacy_states]]
id = "v4-markdown-tooling"

[[migrations]]
# 5.8.0 FR-005 / issue #27: the only 1.7->1.8 delta is the widened legacy-
# acceptance envelope for .markdownlint.json (its managed bytes are byte-identical
# across the two versions). A consumer already on package:1.7 holds the managed
# escaped bytes, so this edge is a no-op re-verify of that one artifact; the literal
# byte form arrives through the legacy path below, not here.
id = "markdown-tooling-1-7-to-1-8"
from = "package:1.7"
to = "package:1.8"
mode = "automatic"
provider = "migrate-legacy"
reversible = false
affected = [
  "artifact:markdownlint-config",
]

[[migrations]]
id = "legacy-v4-to-1-8"
from = "legacy:v4-markdown-tooling"
to = "package:1.8"
mode = "automatic"
provider = "migrate-legacy"
reversible = false
affected = [
  "artifact:markdownlint-config",
  "artifact:prettier-config",
  "config:*",
  "contribution:agents-instructions",
  "contribution:claude-instructions",
  "contribution:editorconfig-charset",
  "contribution:editorconfig-eol",
  "contribution:editorconfig-final-newline",
  "contribution:editorconfig-global-indent-size",
  "contribution:editorconfig-global-indent-style",
  "contribution:editorconfig-global-trailing",
  "contribution:editorconfig-markdown-indent-size",
  "contribution:editorconfig-markdown-indent-style",
  "contribution:editorconfig-markdown-trailing",
  "contribution:editorconfig-root",
  "contribution:editorconfig-yaml-indent-size",
  "contribution:editorconfig-yaml-indent-style",
  "contribution:format-caller",
  "contribution:lint-caller",
  "contribution:vscode-json-formatter",
  "contribution:vscode-jsonc-formatter",
  "contribution:vscode-markdown-format-on-save",
  "contribution:vscode-markdown-formatter",
  "contribution:vscode-markdownlint-extension",
  "contribution:vscode-prettier-extension",
  "contribution:vscode-yaml-formatter",
]
signatures = [
  "legacy-editorconfig",
  "legacy-format-caller",
  "legacy-lint-caller",
  "legacy-markdownlint-config",
  "legacy-prettier-config",
  "legacy-vscode-extensions",
]

[[legacy_signatures]]
# 5.8.0 FR-005 / issue #27: the second digest is the observed literal-UTF-8-CJK
# serialization of the same JSON as the shipped (escaped) config. A consumer wrote
# it by hand before the adopt CLI existed; no release ever shipped it. Accepting it
# here lets either byte form migrate to managed ownership of the escaped bytes
# instead of hard-blocking on MT-LEGACY-MODIFIED. Append-only: the escaped digest
# (unchanged since v2.0.0) stays first.
id = "legacy-markdownlint-config"
kind = "whole-file"
targets = [".markdownlint.json"]
known_content_digests = [
  "sha256:51204b5170e47da3716d3870d36ef1eb4b28a27d7289c65f7f1457943c499793",
  "sha256:4c1c089d0552a6118f6a8b7d85bae1bd762da41d601d1c489bdb9143f6a2d548",
]
consumer_owned_intent_pointer = "/markdown_tooling/markdownlint_config_ownership"

[[legacy_signatures]]
id = "legacy-prettier-config"
kind = "whole-file"
targets = [".prettierrc.json"]
