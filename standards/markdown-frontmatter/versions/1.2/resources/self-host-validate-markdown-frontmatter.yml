name: Validate Markdown Frontmatter

on:
  workflow_call:
    inputs:
      standards-ref:
        description: "project-standards git ref to install (match the caller's uses ref)."
        required: false
        type: string
        default: "v5"

permissions:
  contents: read

jobs:
  validate:
    name: Frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: ${{ github.repository == 'L3DigitalNet/project-standards' }}

      # The standards repository must validate the event commit without requiring
      # the v5 tag that this same commit will publish.
      - name: Install (this repo)
        if: github.repository == 'L3DigitalNet/project-standards'
        run: uv sync --dev

      - name: Validate (this repo)
        if: github.repository == 'L3DigitalNet/project-standards'
        run: uv run project-standards validate

      - name: Install (consuming repo)
        if: github.repository != 'L3DigitalNet/project-standards'
        env:
          PROJECT_STANDARDS_REF: ${{ inputs.standards-ref }}
        run: uv tool install "git+https://github.com/L3DigitalNet/project-standards@${PROJECT_STANDARDS_REF}"

      - name: Validate (consuming repo)
        if: github.repository != 'L3DigitalNet/project-standards'
        run: project-standards validate
