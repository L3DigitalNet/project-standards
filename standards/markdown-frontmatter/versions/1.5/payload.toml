# 5.8.0 FR-006/FR-007 / issue #28: the four validate-standards.yml contributions
# compose the managed caller only while workflow_ownership stays "managed". Setting
# it "consumer-owned" gates every contribution off so a customized caller (see the
# legacy-validate-standards-workflow intent pointer) is left wholly to the consumer.
[[contributions]]
id = "workflow-name"
target = ".github/workflows/validate-standards.yml"
adapter = "yaml"
scope = "key:/name"
policy = "create-only"
source = "workflow-name.yml"
source_digest = "sha256:1fb1ff15ea473a338ab301633364d875a68837e547e148e0c5a6ce6ccfc576c2"
shared_identity = "github-workflow/validate-standards-name"
when_any = [{ option = "workflow_ownership", equals = "managed" }]

[[contributions]]
id = "workflow-on"
target = ".github/workflows/validate-standards.yml"
adapter = "yaml"
scope = "key:/on"
policy = "create-only"
source = "workflow-on.yml"
source_digest = "sha256:a30345f577f7e40934be6a9f7be3cf9f36f8da457d990e3d8b30613ea1750a86"
shared_identity = "github-workflow/validate-standards-triggers"
when_any = [{ option = "workflow_ownership", equals = "managed" }]

[[contributions]]
id = "workflow-permissions"
target = ".github/workflows/validate-standards.yml"
adapter = "yaml"
scope = "key:/permissions"
policy = "managed"
source = "workflow-permissions.yml"
source_digest = "sha256:e8f2263b0413f25128aa11d16dd3ae0ef6b0c660fb5b1dc08fe71e0a7daabb4b"
when_any = [{ option = "workflow_ownership", equals = "managed" }]

[[contributions]]
id = "workflow-frontmatter-job"
target = ".github/workflows/validate-standards.yml"
adapter = "yaml"
scope = "key:/jobs/frontmatter"
policy = "managed"
provider = "render-workflow-job"
when_any = [{ option = "workflow_ownership", equals = "managed" }]

