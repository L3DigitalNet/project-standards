known_content_digests = ["sha256:0f80ec4d966b59d8310f88f4d45478a1272b3b94491cf2a44efb9765bbbe2edc"]

[[legacy_signatures]]
id = "legacy-workflow"
kind = "whole-file"
targets = [".github/workflows/validate-markdown-frontmatter.yml"]
known_content_digests = [
  "sha256:82a9ef1cb1e4f48eddc4a6cc43f317ba93aebe6d485fed6d8736e8e9e0aa279e",
  "sha256:09eb0cc6d6fe20a12b7c7cc5022f9a902ed29d0cdf35ef42c8685c5c93cea036",
]

# 5.8.0 FR-006/FR-007 / issue #28: the intent pointer authorizes relinquishment.
# A customized (unknown-digest) caller migrates to consumer ownership only when the
# legacy markdown.frontmatter.workflow_ownership setting is "consumer-owned"; the
# migrate-legacy provider then emits a preserve claim carrying this pointer. No
# unknown_content_disposition — the payload model forbids that combination, and the
# escape is opt-in through the recognized setting, never an implicit takeover.
[[legacy_signatures]]
id = "legacy-validate-standards-workflow"
kind = "whole-file"
targets = [".github/workflows/validate-standards.yml"]
known_content_digests = [
  "sha256:931900b2811dd8b369836a5e0f8dcc4b7e3de42a447a78dc5d93164c78d0125f",
]
consumer_owned_intent_pointer = "/markdown/frontmatter/workflow_ownership"
