[[legacy_states]]
id = "v4-markdown-frontmatter"

# 5.8.0 FR-006/FR-007 / issue #28: 1.4->1.5 adds only the workflow_ownership
# escape. A consumer already on package:1.4 with the default managed ownership sees
# the same composed caller, so this edge re-verifies the four validate-standards.yml
# contributions and the widened config surface; the relinquishment path itself is
# reached through the legacy migration below, not this package-to-package edge.
[[migrations]]
id = "markdown-frontmatter-1-4-to-1-5"
from = "package:1.4"
to = "package:1.5"
mode = "automatic"
provider = "migrate-legacy"
reversible = false
affected = [
  "config:*",
  "contribution:workflow-frontmatter-job",
  "contribution:workflow-name",
  "contribution:workflow-on",
  "contribution:workflow-permissions",
]

[[migrations]]
id = "legacy-v4-to-1-3"
from = "legacy:v4-markdown-frontmatter"
to = "package:1.5"
mode = "automatic"
provider = "migrate-legacy"
reversible = false
affected = [
  "artifact:skill",
  "artifact:skill-new-doc-id",
  "artifact:skill-openai",
  "artifact:self-host-workflow",
  "config:*",
  "contribution:workflow-frontmatter-job",
  "contribution:workflow-permissions",
]
signatures = [
  "legacy-skill",
  "legacy-skill-script",
  "legacy-validate-standards-workflow",
  "legacy-workflow",
]

[[legacy_signatures]]
id = "legacy-skill"
kind = "whole-file"
