name: Validate standards graph

on:
  pull_request:
  push:
    branches: ["main", "testing"]

permissions:
  contents: read

jobs:
  standards-graph:
    name: Standards graph and catalog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Validate standards graph
        run: uv run project-standards standards validate-graph --root . --require-all-manifests

      - name: Check standards catalog freshness
        run: uv run project-standards standards render-catalog --root . --check

      - name: Resolve released V2 baseline
        id: v2-baseline
        shell: bash
        run: |
          set -euo pipefail
          baseline="$(
            git for-each-ref --sort=-version:refname --format='%(refname:short)' 'refs/tags/v[0-9]*' |
              while IFS= read -r tag; do
                if git ls-tree -r --name-only "$tag" -- catalogs |
                  grep -Eq '^catalogs/[1-9][0-9]*\.toml$'; then
                  printf '%s\n' "$tag"
                  break
                fi
              done
          )"
          if [[ -n "$baseline" ]]; then
            printf 'ref=%s\n' "$baseline" >> "$GITHUB_OUTPUT"
          else
            echo 'No released V2 catalog baseline exists.'
            printf 'ref=\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Check released V2 payloads
        if: steps.v2-baseline.outputs.ref != ''
        run: uv run project-standards packages check-release --root . --baseline "${{ steps.v2-baseline.outputs.ref }}"
