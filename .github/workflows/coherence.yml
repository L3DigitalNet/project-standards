name: Coherence

# Behavioral proof that the shipped .markdownlint.json and .prettierrc.json are
# co-satisfiable (markdownlint accepts Prettier's output). This separately named
# job intentionally repeats the coherence coverage that `check` runs after npm ci.
on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  coherence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - name: Behavioral coherence (Prettier output passes markdownlint)
        run: uv run pytest tests/coherence -v
