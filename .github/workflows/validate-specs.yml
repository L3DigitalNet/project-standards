name: Validate Specs

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - "src/**"
      - ".standards/config.toml"
      # Transitional dogfood authority; Task 14 replaces the root V1 family.
      - ".project-standards.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "**/*.md"
      - "src/**"
      - ".standards/config.toml"
      # Transitional dogfood authority; Task 14 replaces the root V1 family.
      - ".project-standards.yml"
      - "pyproject.toml"
  workflow_call:
    inputs:
      config-path:
        description: "Path to the project standards config file in the calling repo."
        required: false
        type: string
        default: ".standards/config.toml"
      standards-ref:
        description: "project-standards git ref to install from (match your uses: @vN pin)."
        required: false
        type: string
        default: "v5"
      strict-lint:
        description: "Also run `spec lint --strict` (fail on advisory warnings)."
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate-specs:
    name: Specs
    runs-on: ubuntu-latest
    # workflow_call receives the V5 default above. Direct events have no inputs,
    # so an empty value intentionally lets the CLI use this checkout's authority.
    env:
      PROJECT_STANDARDS_SPEC_CONFIG: ${{ inputs.config-path }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: ${{ github.repository == 'L3DigitalNet/project-standards' }}

      - name: Install (this repo)
        if: github.repository == 'L3DigitalNet/project-standards'
        run: uv sync --dev

      - name: Validate specs (this repo)
        if: github.repository == 'L3DigitalNet/project-standards'
        shell: bash
        run: |
          set -euo pipefail
          config_args=()
          if [[ -n "$PROJECT_STANDARDS_SPEC_CONFIG" ]]; then
            config_args=(--config "$PROJECT_STANDARDS_SPEC_CONFIG")
          fi
          uv run project-standards spec validate "${config_args[@]}"

      - name: Lint specs (this repo, strict)
        if: github.repository == 'L3DigitalNet/project-standards' && inputs.strict-lint
        shell: bash
        run: |
          set -euo pipefail
          config_args=()
          if [[ -n "$PROJECT_STANDARDS_SPEC_CONFIG" ]]; then
            config_args=(--config "$PROJECT_STANDARDS_SPEC_CONFIG")
          fi
          uv run project-standards spec lint --strict "${config_args[@]}"

      - name: Install (consuming repo)
        if: github.repository != 'L3DigitalNet/project-standards'
        env:
          PROJECT_STANDARDS_REF: ${{ inputs.standards-ref }}
        run: uv tool install "git+https://github.com/L3DigitalNet/project-standards@${PROJECT_STANDARDS_REF}"

      - name: Validate specs (consuming repo)
        if: github.repository != 'L3DigitalNet/project-standards'
        shell: bash
        run: |
          set -euo pipefail
          config_args=()
          if [[ -n "$PROJECT_STANDARDS_SPEC_CONFIG" ]]; then
            config_args=(--config "$PROJECT_STANDARDS_SPEC_CONFIG")
          fi
          project-standards spec validate "${config_args[@]}"

      - name: Lint specs (consuming repo, strict)
        if: github.repository != 'L3DigitalNet/project-standards' && inputs.strict-lint
        shell: bash
        run: |
          set -euo pipefail
          config_args=()
          if [[ -n "$PROJECT_STANDARDS_SPEC_CONFIG" ]]; then
            config_args=(--config "$PROJECT_STANDARDS_SPEC_CONFIG")
          fi
          project-standards spec lint --strict "${config_args[@]}"
