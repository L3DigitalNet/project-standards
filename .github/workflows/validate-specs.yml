name: Validate Specs

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - "src/**"
      - ".standards/config.toml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "**/*.md"
      - "src/**"
      - ".standards/config.toml"
      - "pyproject.toml"
  workflow_call:
    inputs:
      standards-ref:
        description: "project-standards git ref to install from (match your uses: @vN pin)."
        required: false
        type: string
        default: "v5"
      strict-lint:
        description: "Also run `spec lint --strict` (fail on advisory warnings)."
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate-specs:
    name: Specs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: ${{ github.repository == 'L3DigitalNet/project-standards' }}

      - name: Install candidate wheel (this repo)
        if: github.repository == 'L3DigitalNet/project-standards'
        run: |
          wheel_dir="${RUNNER_TEMP}/project-standards-dist"
          uv build --wheel --out-dir "$wheel_dir"
          mapfile -t wheels < <(find "$wheel_dir" -maxdepth 1 -type f -name 'project_standards-*.whl' -print)
          test "${#wheels[@]}" -eq 1
          wheel="${wheels[0]}"
          uv tool install "$wheel"

      - name: Validate specs (this repo)
        if: github.repository == 'L3DigitalNet/project-standards'
        run: project-standards spec validate

      - name: Lint specs (this repo, strict)
        if: github.repository == 'L3DigitalNet/project-standards' && (github.event_name != 'workflow_call' || inputs.strict-lint)
        run: project-standards spec lint --strict

      - name: Install (consuming repo)
        if: github.repository != 'L3DigitalNet/project-standards'
        env:
          PROJECT_STANDARDS_REF: ${{ github.event_name == 'workflow_call' && inputs.standards-ref || 'v5' }}
        run: uv tool install "git+https://github.com/L3DigitalNet/project-standards@${PROJECT_STANDARDS_REF}"

      - name: Validate specs (consuming repo)
        if: github.repository != 'L3DigitalNet/project-standards'
        run: project-standards spec validate

      - name: Lint specs (consuming repo, strict)
        if: github.repository != 'L3DigitalNet/project-standards' && (github.event_name != 'workflow_call' || inputs.strict-lint)
        run: project-standards spec lint --strict
