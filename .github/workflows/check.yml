name: Check

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/build/wheel-runtime

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Sync Node dependencies
        run: npm ci

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      # SHA-pinned: setup-uv has no moving @v8 tag (dropped as of v8.0.0);
      # Dependabot bumps the SHA via the trailing version comment.
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run basedpyright

      - name: Build candidate wheel
        run: uv build --wheel --out-dir dist

      - name: Select candidate wheel
        shell: bash
        run: |
          mapfile -t candidate_wheels < <(find "${{ github.workspace }}/dist" -maxdepth 1 -type f -name 'project_standards-*.whl' -print)
          test "${#candidate_wheels[@]}" -eq 1
          candidate_wheel="$(realpath "${candidate_wheels[0]}")"
          printf 'PROJECT_STANDARDS_COMPATIBILITY_WHEEL=%s\n' "$candidate_wheel" >> "$GITHUB_ENV"

      - name: Extract candidate wheel
        run: python -m zipfile -e "$PROJECT_STANDARDS_COMPATIBILITY_WHEEL" build/wheel-runtime

      - name: Reset coverage data
        run: uv run coverage erase

      - name: Ordinary tests with coverage
        run: uv run coverage run --source=project_standards -m pytest -m "not performance and not compatibility"

      - name: Compatibility matrix
        run: uv run pytest -m compatibility -n 4 --dist load --max-worker-restart=0

      - name: Performance gates
        run: uv run pytest -m performance

      - name: Coverage report
        run: uv run coverage report

      - name: Dependency audit
        run: uv run pip-audit
