[project_standards]
schema_version = "1.0"
catalog = "5"

[standards.adr]
enabled = true
version = "latest"
config = { contract_version = "1.0", require_sections = true }

[standards.agent-handoff]
enabled = true
version = "latest"
config = { contract_version = "1.0", harnesses = ["claude-code", "codex"], startup = "automatic" }

[standards.cli-documentation]
enabled = true
version = "latest"
config = { contract_version = "1.0" }

[standards.markdown-frontmatter]
enabled = true
version = "latest"
config = { contract_version = "1.1", exclude = ["**/*.template.md", "standards/**", "README.md", "CLAUDE.md", "AGENTS.md", ".claude/**", ".agents/**", ".codex/**", "docs/handoff/**"], include = ["CHANGELOG.md", "UPGRADING.md", "docs/usage.md", "docs/mcp-readiness.md", "docs/workflows/**/*.md", "meta/**/*.md", "docs/adr/**/*.md"], required = true, schema = "markdown-frontmatter", workflow_mode = "local" }

[standards.markdown-tooling]
enabled = true
version = "latest"
config = { contract_version = "1.1", workflow_mode = "self-hosted" }

[standards.project-spec]
enabled = true
version = "latest"
config = { contract_version = "1.1", include_patterns = ["standards/project-spec/examples/**/*.md", "docs/specs/2026-07-07-project-standards-meta-repo-mcp-readiness-spec.md", "docs/specs/2026-07-07-project-standards-mcp-enablement-roadmap-spec.md", "docs/specs/2026-07-07-project-standards-mcp-server-implementation-spec.md", "docs/specs/archive/2026-07-07-standard-bundle-authoring-standard.md", "docs/specs/2026-07-10-standard-bundle-authoring-v2-spec.md", "docs/specs/2026-07-09-agent-handoff-standard-package.md", "docs/specs/2026-07-10-consumer-standards-control-plane-spec.md", "docs/specs/future/usage-documentation-site/**/*.md"], workflow_mode = "self-hosted" }

[standards.python-tooling]
enabled = true
version = "latest"
config = { additional_dev_dependencies = ["types-PyYAML", "pytest-xdist>=3.8", "pyright==1.1.411"], contract_version = "1.0", coverage = { parallel = true, patch = ["subprocess"] }, pytest = { coverage_exclude_also = ["if __name__ == .__main__.:"], fail_under = 85, markers = ["compatibility: catalog-derived source and wheel lifecycle rows run in the parallel phase", "performance: deterministic scale gates run explicitly in CI", "release_replay: disposable release-cut checks run in their own serial phase"] }, ruff = { extend_exclude = [".claude/hooks", ".codex/hooks", "docs/handoff"], line_length = 100 }, workflow_ownership = "consumer-owned" }
